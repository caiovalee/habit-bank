<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)">
<title>CAV.</title>
<style>
:root {
  --tp: #111827;
  --ts: #4b5563;
  --line: #1f2937;
  --dot: rgba(0,0,0,0.1);
  --card-bg: #ffffff;
  --card-border: rgba(0,0,0,0.07);
  --card-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 6px 20px rgba(0,0,0,0.06);
  --card-hover: 0 4px 14px rgba(0,0,0,0.1), 0 20px 40px rgba(0,0,0,0.08);
  --body-bg: #fafafa;
}
@media (prefers-color-scheme: dark) {
  :root {
    --tp: #f3f4f6;
    --ts: #9ca3af;
    --line: #d1d5db;
    --dot: rgba(255,255,255,0.06);
    --card-bg: #1f2937;
    --card-border: rgba(255,255,255,0.06);
    --card-shadow: 0 1px 3px rgba(0,0,0,0.3), 0 6px 20px rgba(0,0,0,0.2);
    --card-hover: 0 4px 14px rgba(0,0,0,0.4), 0 20px 40px rgba(0,0,0,0.3);
    --body-bg: #111827;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background-color: var(--body-bg);
  background-image: radial-gradient(circle, var(--dot) 1.2px, transparent 1.2px);
  background-size: 22px 22px;
  color: var(--tp);
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

/* ── LAYOUT ── */
.hub {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  max-width: 520px;
}

/* ── LOGO ── */
.logo-wrap {
  width: 148px;
  height: 148px;
  display: flex;
  align-items: center;
  justify-content: center;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.08));
}
.logo-svg {
  width: 100%;
  height: 100%;
  color: var(--tp);
  overflow: visible;
}

/* ── TRUNK: vertical line from logo to crossbar ── */
.trunk {
  width: 2px;
  height: 44px;
  background: var(--line);
  opacity: 0.4;
  margin-top: 2px;
}

/* ── BRANCHES AREA ── */
.branches {
  position: relative;
  display: flex;
  width: 100%;
}

/* Horizontal crossbar: center of first branch → center of last branch */
.branches::before {
  content: '';
  position: absolute;
  top: 0;
  left: calc(100% / 6);
  right: calc(100% / 6);
  height: 2px;
  background: var(--line);
  opacity: 0.4;
}

/* ── EACH BRANCH ── */
.branch {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 44px;
  padding-left: 10px;
  padding-right: 10px;
  position: relative;
}

/* Vertical stem: crossbar → card */
.branch::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  height: 44px;
  background: var(--line);
  opacity: 0.4;
}

/* ── APP CARDS ── */
.app-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  text-align: center;
  text-decoration: none;
  color: var(--tp);
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 18px;
  padding: 22px 10px 18px;
  width: 100%;
  min-height: 130px;
  box-shadow: var(--card-shadow);
  transition: transform .22s ease, box-shadow .22s ease;
  cursor: pointer;
  -webkit-user-select: none;
  user-select: none;
}
.app-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--card-hover);
}
.app-card:active {
  transform: translateY(-1px);
}

.app-icon {
  font-size: 30px;
  line-height: 1;
  margin-bottom: 10px;
  display: block;
}
.app-name {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .01em;
  display: block;
  line-height: 1.2;
}
.app-desc {
  font-size: 10px;
  color: var(--ts);
  margin-top: 5px;
  line-height: 1.4;
  display: block;
}

/* ── RESPONSIVE ── */
@media (max-width: 340px) {
  .logo-wrap { width: 116px; height: 116px; }
  .branch { padding-left: 6px; padding-right: 6px; }
  .app-icon { font-size: 24px; }
  .app-name { font-size: 11px; }
}
</style>
</head>
<body>
<div class="hub">

  <!-- LOGO -->
  <div class="logo-wrap">
    <svg class="logo-svg" viewBox="0 0 300 265" xmlns="http://www.w3.org/2000/svg" aria-label="CAV.">
      <!--
        C: thick arc centered at (100,132), outer R=114, inner R=78
        Opening angle ≈ 42° (right side open)
        outer-top  = (100+114·cos42°, 132-114·sin42°) ≈ (185, 56)
        outer-bot  = (185, 208)
        inner-top  = (100+78·cos42°, 132-78·sin42°) ≈ (158, 80)
        inner-bot  = (158, 184)
      -->
      <path
        d="M 185,56
           A 114,114 0 1,0 185,208
           L 158,184
           A 78,78   0 1,1 158,80
           Z"
        fill="currentColor"/>

      <!-- AV: geometric heavy, overlapping the C opening -->
      <text
        x="207" y="183"
        font-family="'Arial Black','Arial Bold','Helvetica Neue',Impact,sans-serif"
        font-size="118"
        font-weight="900"
        fill="currentColor"
        text-anchor="middle"
        dominant-baseline="auto"
        letter-spacing="-4">AV</text>

      <!-- Square dot -->
      <rect x="250" y="216" width="26" height="26" fill="currentColor"/>
    </svg>
  </div>

  <!-- TRUNK -->
  <div class="trunk"></div>

  <!-- TREE BRANCHES -->
  <div class="branches" role="list">

    <div class="branch" role="listitem">
      <a href="/index.html" class="app-card">
        <span class="app-icon">🏦</span>
        <span class="app-name">Habit Bank</span>
        <span class="app-desc">Cofrinho &amp; conquistas</span>
      </a>
    </div>

    <div class="branch" role="listitem">
      <a href="/warehouse.html" class="app-card">
        <span class="app-icon">📦</span>
        <span class="app-name">Warehouse</span>
        <span class="app-desc">Epics &amp; projetos</span>
      </a>
    </div>

    <div class="branch" role="listitem">
      <a href="/english.html" class="app-card">
        <span class="app-icon">🇺🇸</span>
        <span class="app-name">English</span>
        <span class="app-desc">Gramática &amp; glossário</span>
      </a>
    </div>

  </div>
</div>
</body>
</html>
