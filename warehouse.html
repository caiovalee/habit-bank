<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Almoxarifado Pessoal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root{--font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
        body{font-family:var(--font-sans);font-size:14px}
        .topnav{display:flex;gap:6px;padding:8px 14px;background:#ffffffd9;border-bottom:1px solid rgb(226 232 240);position:sticky;top:0;z-index:30;backdrop-filter:blur(8px)}
        .topnav a{padding:6px 14px;color:#475569;text-decoration:none;border-radius:10px;font-size:14px}
        .topnav a.active{background:#e2e8f0;color:#0f172a;font-weight:600}
    </style>
</head>

<body class="bg-slate-100">
    <nav class="topnav">
        <a href="./home.html" title="Início" style="font-size:16px;padding:6px 10px">🏠</a>
        <a href="./habitbank.html">🪙 Cofrinho</a>
        <a href="./warehouse.html" class="active">📦 Warehouse</a>
    </nav>
    <div id="root"></div>

    <!-- React + ReactDOM UMD -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel para compilar JSX no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-presets="react">
        const { useEffect, useMemo, useState } = React;

        const APP_TIMEZONE = "America/Sao_Paulo";
        const TK = "cof_token";
        const GK = "cof_gist";
        const GIST_FILE = "warehouse.json";
        const IS_FILE_PROTOCOL = typeof location !== "undefined" && location.protocol === "file:";

        // =============================
        // Utilidades
        // =============================
        function uid() { return `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`; }
        function classNames(...xs) { return xs.filter(Boolean).join(" "); }
        function normalizeText(value) {
            return String(value || "")
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .toLowerCase()
                .trim();
        }
        function toLocalDateInputValue(date = new Date()) {
            const parts = new Intl.DateTimeFormat("en-CA", {
                timeZone: APP_TIMEZONE,
                year: "numeric",
                month: "2-digit",
                day: "2-digit"
            }).formatToParts(date);
            const year = parts.find((part) => part.type === "year")?.value || "0000";
            const month = parts.find((part) => part.type === "month")?.value || "00";
            const day = parts.find((part) => part.type === "day")?.value || "00";
            return `${year}-${month}-${day}`;
        }
        function parseDate(d) { if (!d) return null; const [y, m, day] = d.split("-").map(n => parseInt(n, 10)); if (!y || !m || !day) return null; return new Date(y, m - 1, day); }
        function formatDate(dateISO) { const d = parseDate(dateISO); return d ? d.toLocaleDateString("pt-BR") : "—"; }
        function formatDateTime(ts) {
            const d = new Date(ts);
            return isNaN(d.getTime()) ? "—" : d.toLocaleString("pt-BR", {
                timeZone: APP_TIMEZONE,
                day: "2-digit",
                month: "2-digit",
                year: "numeric",
                hour: "2-digit",
                minute: "2-digit"
            });
        }
        function stockStatus(it) { if ((Number(it.quantidade) || 0) <= 0) return { label: "Sem estoque", tone: "danger" }; if ((Number(it.quantidade) || 0) <= 2) return { label: "Baixo", tone: "warning" }; return { label: "OK", tone: "ok" }; }
        function lowStock(it) { return (Number(it.quantidade) || 0) <= 0; }
        function getToken() { return localStorage.getItem(TK) || ""; }
        function getGistId() { return localStorage.getItem(GK) || ""; }
        function hasGistConfig() { return !!(getToken() && getGistId()); }
        async function gistFetchWarehouse(token = getToken(), gistId = getGistId()) {
            const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                headers: {
                    Authorization: `token ${token}`,
                    Accept: "application/vnd.github+json"
                }
            });
            if (!response.ok) throw new Error("GET " + response.status);
            const data = await response.json();
            const file = data.files?.[GIST_FILE];
            return file?.content || null;
        }
        async function gistSaveWarehouse(json, token = getToken(), gistId = getGistId()) {
            const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                method: "PATCH",
                headers: {
                    Authorization: `token ${token}`,
                    Accept: "application/vnd.github+json",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ files: { [GIST_FILE]: { content: json } } })
            });
            if (!response.ok) throw new Error("PATCH " + response.status);
        }

        const CATEGORIAS_PADRAO = ["Remédios", "Cuidados Pessoais", "Papelaria", "Diversos"];

        // ===== UI primitives =====
        const Pill = ({ children, tone = "muted" }) => (
            <span className={classNames("inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium",
                tone === "danger" && "bg-red-100 text-red-800",
                tone === "warning" && "bg-amber-100 text-amber-800",
                tone === "ok" && "bg-emerald-100 text-emerald-800",
                tone === "muted" && "bg-slate-100 text-slate-700")}>{children}</span>
        );

        const Section = ({ title, children, right }) => (
            <section className="bg-white rounded-2xl shadow p-4">
                <div className="flex items-center justify-between mb-3">
                    <h2 className="text-lg font-semibold text-slate-900">{title}</h2>
                    {right}
                </div>
                {children}
            </section>
        );

        const WarningBanner = ({ children }) => (
            <div className="max-w-5xl mx-auto px-4 pt-4">
                <div className="rounded-2xl border border-amber-300 bg-amber-50 px-4 py-3 text-sm text-amber-900">
                    {children}
                </div>
            </div>
        );

        const Icon = {
            Plus: (p) => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="w-5 h-5" {...p}><path strokeWidth="2" strokeLinecap="round" d="M12 5v14M5 12h14" /></svg>),
            Trash: (p) => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="w-5 h-5" {...p}><path strokeWidth="2" strokeLinecap="round" d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14" /></svg>),
            Edit: (p) => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="w-5 h-5" {...p}><path strokeWidth="2" strokeLinecap="round" d="M4 20l4-1 9-9a2.5 2.5 0 10-3.5-3.5L4.5 15.5 4 20z" /></svg>),
            Archive: (p) => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="w-5 h-5" {...p}><path strokeWidth="2" strokeLinecap="round" d="M4 7h16v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7Z" /><path strokeWidth="2" strokeLinecap="round" d="M3 7l2-3h14l2 3" /><path strokeWidth="2" strokeLinecap="round" d="M9 12h6" /></svg>),
            Search: (p) => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="w-4 h-4" {...p}><circle cx="11" cy="11" r="7" strokeWidth="2" /><path strokeWidth="2" strokeLinecap="round" d="M20 20l-3-3" /></svg>),
            Filter: (p) => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="w-5 h-5" {...p}><path strokeWidth="2" strokeLinecap="round" d="M4 6h16M7 12h10M10 18h4" /></svg>),
            Cart: (p) => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="w-5 h-5" {...p}><path strokeWidth="2" strokeLinecap="round" d="M3 4h2l2 12h10l2-8H7" /><circle cx="10" cy="20" r="1" /><circle cx="17" cy="20" r="1" /></svg>),
            Minus: (p) => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" className="w-4 h-4" {...p}><path strokeWidth="2" strokeLinecap="round" d="M5 12h14" /></svg>)
        };

        // ===== Header (sem perfis e sem imprimir) =====
        function Header({ onAdd, onSave, onOpenSync, saveLabel, syncLabel, saveButtonLabel, saveButtonDisabled }) {
            return (
                <header className="sticky top-[54px] z-20 backdrop-blur bg-white/70 border-b border-slate-200">
                    <div className="max-w-5xl mx-auto px-4 py-3 flex flex-wrap gap-2 items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="w-9 h-9 rounded-2xl bg-indigo-600 text-white grid place-items-center shadow"><Icon.Cart className="w-4 h-4" /></div>
                            <div>
                                <h1 className="text-lg font-bold text-slate-900">Almoxarifado Pessoal</h1>
                            <p className="text-xs text-slate-500">Inventário pessoal simples e adaptado para celular</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            <span className="text-xs text-slate-500">{saveLabel}</span>
                            <span className="text-xs text-slate-500">{syncLabel}</span>
                            <button onClick={onOpenSync} disabled={IS_FILE_PROTOCOL} className={classNames("px-3 py-2 rounded-xl text-xs", IS_FILE_PROTOCOL ? "border border-slate-200 text-slate-400 cursor-not-allowed" : "border border-slate-300 hover:bg-slate-50 text-slate-700")}>⚙ Sync</button>
                            <button onClick={onSave} disabled={saveButtonDisabled || IS_FILE_PROTOCOL} className={classNames("px-3 py-2 rounded-xl text-xs transition-colors", (saveButtonDisabled || IS_FILE_PROTOCOL) ? "border border-emerald-300 bg-emerald-50 text-emerald-700 cursor-default" : "border border-slate-300 hover:bg-slate-50 text-slate-700")}>{IS_FILE_PROTOCOL ? "Use localhost" : saveButtonLabel}</button>
                            <button onClick={onAdd} className="px-3 py-2 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-sm text-white inline-flex items-center gap-2"><Icon.Plus /> Novo item</button>
                        </div>
                    </div>
                </header>
            );
        }

        function Toolbar({ categoria, setCategoria, sortBy, setSortBy, categorias, onManageCats }) {
            return (
                <div className="flex flex-col gap-2">
                    <div className="flex gap-1 bg-slate-100 p-1 rounded-xl flex-wrap">
                        {["Todas", ...categorias].map((c) => (
                            <button key={c} onClick={() => setCategoria(c)} className={classNames("px-3 py-1.5 text-xs rounded-lg", categoria === c ? "bg-white shadow text-slate-900" : "text-slate-600 hover:text-slate-900")}>{c}</button>
                        ))}
                    </div>
                    <div className="flex items-center gap-2 flex-wrap">
                        <button onClick={onManageCats} className="px-3 py-2 rounded-xl border border-slate-300 text-xs text-slate-700 hover:bg-slate-50">Gerenciar categorias</button>
                        <div className="flex items-center gap-2 ml-auto">
                        <Icon.Filter className="text-slate-400" />
                        <select value={sortBy} onChange={(e) => setSortBy(e.target.value)} className="px-3 py-2 rounded-xl border border-slate-300 bg-white text-xs text-slate-900">
                            <option value="updated">Ordenar: Atualização recente</option>
                            <option value="nome">Ordenar: Nome (A→Z)</option>
                            <option value="quantidade">Ordenar: Quantidade (↓)</option>
                            <option value="registro">Ordenar: Registro (mais recente)</option>
                            <option value="categoria">Ordenar: Categoria</option>
                        </select>
                        </div>
                    </div>
                </div>
            );
        }

        function Stats({ items }) {
            const total = items.length; const comTag = items.filter(it => Array.isArray(it.tags) && it.tags.length > 0).length; const byCat = new Map(); for (const it of items) { byCat.set(it.categoria, (byCat.get(it.categoria) || 0) + 1); }
            return (
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                    <div className="bg-indigo-50 rounded-2xl p-4"><div className="text-xs text-indigo-700">Total de itens</div><div className="text-xl font-bold text-indigo-900">{total}</div></div>
                    <div className="bg-emerald-50 rounded-2xl p-4"><div className="text-xs text-emerald-700">Categorias</div><div className="text-xl font-bold text-emerald-900">{Array.from(byCat.keys()).length} <span className="text-xs font-normal">ativas</span></div></div>
                    <div className="bg-amber-50 rounded-2xl p-4"><div className="text-xs text-amber-700">Com tag</div><div className="text-xl font-bold text-amber-900">{comTag}</div></div>
                </div>
            );
        }

        function PendingList({ items, onCheck }) {
            return (
                <div className="space-y-3">
                    <p className="text-xs text-slate-600">Pendências para compra</p>
                    {items.length === 0 ? <div className="text-sm text-slate-500">Nenhuma pendência no momento.</div> : null}
                    <div className="grid gap-2">
                        {items.map((it) => (
                            <div key={`pending-${it.id}`} className="rounded-xl border border-amber-200 bg-amber-50/80 px-3 py-3 flex flex-col gap-2 md:flex-row md:items-center md:justify-between">
                                <div>
                                    <div className="text-sm font-medium text-slate-900">{it.nome} <span className="text-xs text-slate-500">({it.categoria})</span></div>
                                    <div className="text-xs text-slate-600">
                                        Estoque: {it.quantidade} {it.unidade || "un"}
                                        {Array.isArray(it.tags) && it.tags.length ? ` • Tags: ${it.tags.join(", ")}` : ""}
                                    </div>
                                </div>
                                <button type="button" onClick={() => onCheck(it)} className="px-3 py-2 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-xs text-white">Registrar compra</button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function Table({ items, onInc, onDec, onEdit, onArchive, onDelete, onCheck }) {
            return (
                <>
                    <div className="hidden md:block overflow-x-auto">
                    <table className="min-w-full border-separate border-spacing-y-2 text-xs">
                        <thead>
                            <tr className="text-left text-xs uppercase text-slate-500">
                                <th className="px-3">Item</th><th className="px-3">Qtd</th><th className="px-3">Label</th><th className="px-3">Registro</th><th className="px-3">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            {items.map((it) => {
                                const status = stockStatus(it); return (
                                    <tr key={it.id} className="bg-white shadow rounded-xl">
                                        <td className="px-3 py-3 align-top"><div className="font-medium text-slate-900">{it.nome}</div><div className="flex flex-wrap gap-1 mt-1 items-center"><Pill tone="muted">{it.categoria}</Pill>{it.notas && <span className="text-xs text-slate-500">• {it.notas}</span>}</div></td>
                                        <td className="px-3 py-3 align-top"><div className={classNames("inline-flex items-center gap-2 px-2 py-1 rounded-xl border", status.tone === "danger" ? "border-rose-300 bg-rose-50 text-rose-700" : "border-slate-300")}>
                                            <button type="button" onClick={() => onDec(it)} className="p-1 rounded hover:bg-slate-100"><Icon.Minus /></button>
                                            <span className="tabular-nums font-semibold">{it.quantidade} {it.unidade || "un"}</span>
                                            <button type="button" onClick={() => onInc(it)} className="p-1 rounded hover:bg-slate-100"><Icon.Plus /></button>
                                        </div></td>
                                        <td className="px-3 py-3 align-top">
                                            <div className="flex flex-wrap gap-1">
                                                {Array.isArray(it.tags) && it.tags.length > 0 ? it.tags.map((tag, idx) => <Pill key={`${it.id}-tag-${idx}`} tone="ok">{tag}</Pill>) : <span className="text-slate-400">—</span>}
                                            </div>
                                        </td>
                                        <td className="px-3 py-3 align-top"><span className="text-slate-700">{formatDate(it.registroData || "")}</span></td>
                                        <td className="px-3 py-3 align-top">
                                            <div className="flex gap-2">
                                                <button type="button" onClick={() => onEdit(it)} title="Editar" className="p-2 rounded-lg border border-slate-300 hover:bg-slate-50 text-slate-700"><Icon.Edit className="w-4 h-4" /></button>
                                                <button type="button" onClick={() => onArchive(it)} title="Arquivar" className="p-2 rounded-lg border border-slate-300 hover:bg-slate-50 text-slate-700"><Icon.Archive className="w-4 h-4" /></button>
                                                {lowStock(it) && <button type="button" onClick={() => onCheck(it)} title="Registrar compra" className="p-2 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white"><Icon.Cart className="w-4 h-4" /></button>}
                                                <button type="button" onClick={() => onDelete(it)} title="Remover" className="p-2 rounded-lg bg-rose-600 hover:bg-rose-700 text-white"><Icon.Trash className="w-4 h-4" /></button>
                                            </div>
                                        </td>
                                    </tr>);
                            })}
                        </tbody>
                    </table>
                    </div>
                    <div className="grid gap-3 md:hidden">
                        {items.map((it) => {
                            const status = stockStatus(it);
                            return (
                                <article key={it.id} className="rounded-2xl bg-white p-4 shadow border border-slate-200">
                                    <div className="flex items-start justify-between gap-3">
                                        <div>
                                            <h3 className="font-semibold text-slate-900">{it.nome}</h3>
                                            <div className="flex flex-wrap gap-2 mt-2">
                                                <Pill tone="muted">{it.categoria}</Pill>
                                                {Array.isArray(it.tags) ? it.tags.map((tag, idx) => <Pill key={`${it.id}-mobile-tag-${idx}`} tone="ok">{tag}</Pill>) : null}
                                                <Pill tone={status.tone}>{status.label}</Pill>
                                            </div>
                                        </div>
                                        <button type="button" onClick={() => onEdit(it)} className="px-2 py-2 rounded-lg border border-slate-300 hover:bg-slate-50"><Icon.Edit /></button>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3 mt-4 text-sm">
                                        <div><div className="text-slate-500">Quantidade</div><div className="font-medium text-slate-900">{it.quantidade} {it.unidade || "un"}</div></div>
                                        <div><div className="text-slate-500">Registro</div><div className="font-medium text-slate-900">{formatDate(it.registroData || "")}</div></div>
                                        <div><div className="text-slate-500">Atualizado</div><div className="font-medium text-slate-900">{new Date(it.updatedAt || Date.now()).toLocaleDateString("pt-BR", { timeZone: APP_TIMEZONE })}</div></div>
                                    </div>
                                    {it.notas ? <p className="mt-3 text-sm text-slate-600">{it.notas}</p> : null}
                                    <div className="mt-4 flex flex-wrap gap-2">
                                        <button type="button" onClick={() => onDec(it)} className="px-3 py-2 rounded-xl border border-slate-300 inline-flex items-center gap-2"><Icon.Minus /> 1</button>
                                        <button type="button" onClick={() => onInc(it)} className="px-3 py-2 rounded-xl border border-slate-300 inline-flex items-center gap-2"><Icon.Plus /> 1</button>
                                        {lowStock(it) && <button type="button" onClick={() => onCheck(it)} className="p-2 rounded-xl bg-emerald-600 text-white inline-flex items-center"><Icon.Cart className="w-4 h-4" /></button>}
                                        <button type="button" onClick={() => onArchive(it)} className="p-2 rounded-xl border border-slate-300 text-slate-700 inline-flex items-center"><Icon.Archive className="w-4 h-4" /></button>
                                        <button type="button" onClick={() => onDelete(it)} className="p-2 rounded-xl bg-rose-600 text-white inline-flex items-center"><Icon.Trash className="w-4 h-4" /></button>
                                    </div>
                                </article>
                            );
                        })}
                    </div>
                </>
            );
        }

        function Modal({ open, onClose, title, children, footer }) {
            if (!open) return null; return (
                <div className="fixed inset-0 z-30">
                    <div className="absolute inset-0 bg-slate-900/50" onClick={onClose} />
                    <div className="absolute inset-0 flex items-center justify-center p-4">
                        <div className="w-full max-w-5xl bg-white rounded-2xl shadow-xl border border-slate-200">
                            <div className="p-4 border-b border-slate-200 flex items-center justify-between"><h3 className="text-lg font-semibold text-slate-900">{title}</h3><button onClick={onClose} className="px-3 py-1.5 rounded-lg border border-slate-300 hover:bg-slate-50">Fechar</button></div>
                            <div className="p-4 max-h-[70vh] overflow-auto">{children}</div>
                            {footer && <div className="p-4 border-t border-slate-200 bg-slate-50 rounded-b-2xl">{footer}</div>}
                        </div>
                    </div>
                </div>);
        }

        function ManageCategoriesModal({ open, onClose, categorias, setCategorias, items, setItems }) {
            const [novo, setNovo] = useState("");
            const counts = useMemo(() => { const m = new Map(); for (const c of categorias) m.set(c, 0); for (const it of items) m.set(it.categoria, (m.get(it.categoria) || 0) + 1); return m; }, [categorias, items]);
            function addCategoria() { const name = (novo || "").trim(); if (!name) return; setCategorias(prev => prev.includes(name) ? prev : [...prev, name]); setNovo(""); }
            function renomear(oldName) { const novoNome = prompt(`Renomear "${oldName}" para:`, oldName); if (!novoNome || novoNome.trim() === oldName) return; const newN = novoNome.trim(); setCategorias(prev => Array.from(new Set(prev.map(c => c === oldName ? newN : c)))); setItems(prev => prev.map(it => it.categoria === oldName ? { ...it, categoria: newN, updatedAt: Date.now() } : it)); alert("Categoria renomeada."); }
            function remover(name) { const usados = counts.get(name) || 0; if (usados > 0) { if (!confirm(`A categoria "${name}" possui ${usados} item(ns). Remover e mover para "Diversos"?`)) return; setItems(prev => prev.map(it => it.categoria === name ? { ...it, categoria: "Diversos", updatedAt: Date.now() } : it)); } setCategorias(prev => prev.filter(c => c !== name)); }
            if (!open) return null; return (
                <Modal open={open} onClose={onClose} title="Gerenciar categorias">
                    <div className="space-y-3">
                        <div className="flex gap-2"><input value={novo} onChange={(e) => setNovo(e.target.value)} placeholder="Nova categoria" className="flex-1 px-3 py-2 rounded-xl border border-slate-300 bg-white" /><button onClick={addCategoria} className="px-3 py-2 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white">Adicionar</button></div>
                        <ul className="divide-y divide-slate-200">{categorias.map(c => (
                            <li key={c} className="py-2 flex items-center justify-between"><div className="flex items-center gap-2"><Pill tone="muted">{c}</Pill><span className="text-xs text-slate-500">{counts.get(c) || 0} itens</span></div><div className="flex gap-2"><button onClick={() => renomear(c)} className="px-2 py-1 rounded-lg border border-slate-300 hover:bg-slate-50 inline-flex items-center gap-1"><Icon.Edit /> Renomear</button><button onClick={() => remover(c)} className="px-2 py-1 rounded-lg bg-rose-600 hover:bg-rose-700 text-white inline-flex items-center gap-1"><Icon.Trash /> Remover</button></div></li>
                        ))}</ul>
                        <p className="text-xs text-slate-500">Ao remover uma categoria com itens, eles serão movidos para "Diversos".</p>
                    </div>
                </Modal>);
        }

        function ItemForm({ initial, onSubmit, onCancel, categorias, onCreateCategoria }) {
            const today = toLocalDateInputValue();
            const [form, setForm] = useState(() => initial || ({ id: uid(), nome: "", categoria: "Remédios", quantidade: 1, unidade: "un", tags: [], registroData: today, notas: "", createdAt: Date.now(), updatedAt: Date.now() }));
            const [tagInput, setTagInput] = useState("");
            useEffect(() => { if (initial) setForm(initial); }, [initial]);
            function setField(k, v) { setForm(f => ({ ...f, [k]: v, updatedAt: Date.now() })); }
            function addTag() {
                const next = tagInput.trim();
                if (!next) return;
                if ((form.tags || []).some(tag => tag.toLowerCase() === next.toLowerCase())) {
                    setTagInput("");
                    return;
                }
                setForm(f => ({ ...f, tags: [...(f.tags || []), next], updatedAt: Date.now() }));
                setTagInput("");
            }
            function removeTag(tagToRemove) {
                setForm(f => ({ ...f, tags: (f.tags || []).filter(tag => tag !== tagToRemove), updatedAt: Date.now() }));
            }
            function handleSubmit(e) {
                e.preventDefault();
                if (!form.nome.trim()) return alert("Informe o nome do item.");
                if (!form.categoria) return alert("Selecione a categoria.");
                if (!Number.isFinite(Number(form.quantidade)) || Number(form.quantidade) < 1) return alert("A quantidade inicial deve ser no mínimo 1.");
                onSubmit({ ...form, quantidade: Math.max(1, Number(form.quantidade) || 1), tags: (form.tags || []).map(tag => tag.trim()).filter(Boolean), registroData: form.registroData || today });
            }
            return (
                <form onSubmit={handleSubmit} className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div className="md:col-span-2"><label className="text-sm text-slate-600">Nome</label><input value={form.nome} onChange={(e) => setField("nome", e.target.value)} className="w-full mt-1 px-3 py-2 rounded-xl border border-slate-300 bg-white" placeholder="Ex.: Dipirona 500mg, Desodorante Nivea, Caneta esferográfica" /></div>
                    <div><label className="text-sm text-slate-600">Categoria</label>
                        <select value={form.categoria} onChange={(e) => { const v = e.target.value; if (v === "__new__") { const nome = prompt("Nome da nova categoria:"); if (nome && nome.trim()) { const novo = nome.trim(); onCreateCategoria?.(novo); setField("categoria", novo); } } else { setField("categoria", v); } }} className="w-full mt-1 px-3 py-2 rounded-xl border border-slate-300 bg-white">
                            <option value="__new__">+ Criar nova categoria…</option>
                            {categorias.map(c => (<option key={c} value={c}>{c}</option>))}
                        </select>
                    </div>
                    <div><label className="text-sm text-slate-600">Quantidade</label><input type="number" inputMode="numeric" min="1" step="1" value={form.quantidade} onChange={(e) => setField("quantidade", Math.max(1, Number(e.target.value) || 1))} className="w-full mt-1 px-3 py-2 rounded-xl border border-slate-300 bg-white" /></div>
                    <div><label className="text-sm text-slate-600">Unidade</label><input value={form.unidade} onChange={(e) => setField("unidade", e.target.value)} className="w-full mt-1 px-3 py-2 rounded-xl border border-slate-300 bg-white" placeholder="un, ml, g, L..." /></div>
                    <div>
                        <label className="text-sm text-slate-600">Tags</label>
                        <div className="mt-1 flex gap-2">
                            <input value={tagInput} onChange={(e) => setTagInput(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); addTag(); } }} className="w-full px-3 py-2 rounded-xl border border-slate-300 bg-white" placeholder="Ex.: uso diário, reserva, viagem..." />
                            <button type="button" onClick={addTag} className="px-3 py-2 rounded-xl border border-slate-300 hover:bg-slate-50">Add</button>
                        </div>
                        <div className="mt-2 flex flex-wrap gap-2">
                            {(form.tags || []).length > 0 ? form.tags.map((tag, idx) => (
                                <button key={`form-tag-${idx}`} type="button" onClick={() => removeTag(tag)} className="inline-flex items-center gap-1 rounded-full bg-emerald-100 px-3 py-1 text-xs font-medium text-emerald-800">
                                    {tag}
                                    <span>×</span>
                                </button>
                            )) : <span className="text-xs text-slate-400">Nenhuma tag ainda.</span>}
                        </div>
                    </div>
                    <div><label className="text-sm text-slate-600">Data de registro</label><input type="date" value={form.registroData || ""} onChange={(e) => setField("registroData", e.target.value)} className="w-full mt-1 px-3 py-2 rounded-xl border border-slate-300 bg-white" /></div>
                    <div className="md:col-span-2"><label className="text-sm text-slate-600">Notas</label><textarea value={form.notas} onChange={(e) => setField("notas", e.target.value)} rows={3} className="w-full mt-1 px-3 py-2 rounded-xl border border-slate-300 bg-white" placeholder="Observações, fabricante, lote, restrições, etc." /></div>
                    <div className="md:col-span-2 flex items-center justify-end gap-2"><button type="button" onClick={onCancel} className="px-4 py-2 rounded-xl border border-slate-300 hover:bg-slate-50">Cancelar</button><button type="submit" className="px-4 py-2 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white">Salvar</button></div>
                </form>
            );
        }

        function PurchaseControl({ purchaseLog, onDeleteEntry }) {
            return (
                <div>
                    <p className="text-xs text-slate-600 mb-3">Histórico de compras registradas</p>
                    {purchaseLog.length === 0 ? <div className="text-sm text-slate-500">Nenhum registro ainda.</div> : <PurchaseHistory log={purchaseLog} onDeleteEntry={onDeleteEntry} />}
                </div>
            );
        }

        function SyncModal({ open, onClose, cfgToken, setCfgToken, cfgGistId, setCfgGistId, cfgMsg, onTest, onSaveSync, onClearSync }) {
            if (!open) return null;
            return (
                <Modal open={open} onClose={onClose} title="☁ Sincronização entre dispositivos">
                    <div className="space-y-3">
                        <p className="text-sm text-slate-600">Use o mesmo token e o mesmo Gist das outras páginas. O warehouse será salvo no arquivo <code>warehouse.json</code>.</p>
                        <div>
                            <label className="text-sm text-slate-600">Token</label>
                            <input value={cfgToken} onChange={(e) => setCfgToken(e.target.value)} type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxx" autoComplete="off" className="w-full mt-1 px-3 py-2 rounded-xl border border-slate-300 bg-white" />
                        </div>
                        <div>
                            <label className="text-sm text-slate-600">Gist ID</label>
                            <input value={cfgGistId} onChange={(e) => setCfgGistId(e.target.value)} placeholder="abc123def456..." autoComplete="off" className="w-full mt-1 px-3 py-2 rounded-xl border border-slate-300 bg-white" />
                        </div>
                        <div className="text-sm min-h-[20px] text-slate-600">{cfgMsg}</div>
                        <div className="flex justify-end gap-2 flex-wrap">
                            <button type="button" onClick={onClearSync} className="px-3 py-2 rounded-xl text-xs border border-rose-300 text-rose-700 hover:bg-rose-50">Desconectar</button>
                            <button type="button" onClick={onTest} className="px-3 py-2 rounded-xl text-xs border border-slate-300 hover:bg-slate-50">Testar</button>
                            <button type="button" onClick={onSaveSync} className="px-3 py-2 rounded-xl text-xs bg-indigo-600 hover:bg-indigo-700 text-white">Salvar e sincronizar</button>
                        </div>
                    </div>
                </Modal>
            );
        }

        function PurchaseHistory({ log, onDeleteEntry }) {
            const grouped = {};
            log.forEach((entry) => {
                const day = new Date(entry.checkedAt).toLocaleDateString("pt-BR", { timeZone: APP_TIMEZONE });
                if (!grouped[day]) grouped[day] = [];
                grouped[day].push(entry);
            });
            return (
                <div className="rounded-2xl border border-slate-200 overflow-hidden bg-white">
                    {Object.entries(grouped).map(([day, entries]) => (
                        <div key={day}>
                            <div className="px-4 py-2 bg-slate-100 text-xs uppercase tracking-wide text-slate-500">{day}</div>
                            {entries.map((entry) => (
                                <div key={entry.id} className="px-4 py-3 border-t border-slate-100 flex items-start justify-between gap-3">
                                    <div>
                                        <div className="font-medium text-slate-900">{entry.nome}</div>
                                        <div className="text-sm text-slate-600">
                                            {entry.categoria}
                                            {entry.action === "archived" ? " • Arquivado" : ""}
                                            {Array.isArray(entry.tags) && entry.tags.length ? ` • ${entry.tags.join(", ")}` : ""}
                                            {entry.quantidade ? ` • +${entry.quantidade} ${entry.unidade || "un"}` : ""}
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <div className="text-xs text-slate-500 whitespace-nowrap">{formatDateTime(entry.checkedAt)}</div>
                                        <button type="button" onClick={() => onDeleteEntry(entry.id)} title="Excluir do histórico" className="p-2 rounded-lg border border-slate-300 hover:bg-slate-50 text-slate-600"><Icon.Trash className="w-4 h-4" /></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    ))}
                </div>
            );
        }

        // ===== Persistência simples (sem perfis) =====
        const LS_STATE = "almoxarifado-state-v4";
        const LS_ITEMS = "almoxarifado-items-v2";
        const LS_CATS = "almoxarifado-categorias-v2";
        const LS_PURCHASE_LOG = "almoxarifado-purchase-log-v3";
        // chaves antigas p/ migração opcional
        const OLD_ITEMS = "almoxarifado-items-v1";
        const OLD_CATS = "almoxarifado-categorias-v1";
        const LS_ACTIVE = "almoxarifado-active-profile-v1";
        const LS_DATA_PREFIX = "almoxarifado-data-v1::";

        function loadInitial() {
            // 1) snapshot único mais novo
            try {
                const snapshot = JSON.parse(localStorage.getItem(LS_STATE) || "null");
                if (snapshot && typeof snapshot === "object") {
                    const items = Array.isArray(snapshot.items) ? snapshot.items : [];
                    const cats = Array.isArray(snapshot.cats) && snapshot.cats.length ? snapshot.cats : CATEGORIAS_PADRAO;
                    const purchaseLog = Array.isArray(snapshot.purchaseLog) ? snapshot.purchaseLog : [];
                    return { items, cats, purchaseLog };
                }
            } catch { }
            // 2) se já existem as chaves v2, usa elas
            try {
                const i = JSON.parse(localStorage.getItem(LS_ITEMS) || "null");
                const c = JSON.parse(localStorage.getItem(LS_CATS) || "null");
                const p = JSON.parse(localStorage.getItem(LS_PURCHASE_LOG) || "null");
                if (Array.isArray(i) && Array.isArray(c)) return { items: i, cats: c.length ? c : CATEGORIAS_PADRAO, purchaseLog: Array.isArray(p) ? p : [] };
            } catch { }
            // 3) migrar de v1 (sem perfis)
            try {
                const i = JSON.parse(localStorage.getItem(OLD_ITEMS) || "null");
                const c = JSON.parse(localStorage.getItem(OLD_CATS) || "null");
                if (Array.isArray(i) || Array.isArray(c)) {
                    const data = { items: i || [], cats: (c && c.length ? c : CATEGORIAS_PADRAO), purchaseLog: [] };
                    localStorage.setItem(LS_STATE, JSON.stringify(data));
                    localStorage.setItem(LS_ITEMS, JSON.stringify(data.items));
                    localStorage.setItem(LS_CATS, JSON.stringify(data.cats));
                    return data;
                }
            } catch { }
            // 4) tentar migrar do perfil ativo (não protegido)
            try {
                const active = localStorage.getItem(LS_ACTIVE) || "voce";
                const raw = localStorage.getItem(LS_DATA_PREFIX + active);
                if (raw) {
                    const obj = JSON.parse(raw); if (obj && !obj.__enc) {
                        const data = { items: obj.items || [], cats: obj.cats || CATEGORIAS_PADRAO, purchaseLog: [] };
                        localStorage.setItem(LS_STATE, JSON.stringify(data));
                        localStorage.setItem(LS_ITEMS, JSON.stringify(data.items));
                        localStorage.setItem(LS_CATS, JSON.stringify(data.cats));
                        return data;
                    }
                }
            } catch { }
            // 5) vazio
            return { items: [], cats: CATEGORIAS_PADRAO, purchaseLog: [] };
        }

        function normalizeItems(items) {
            const today = toLocalDateInputValue();
            return (items || []).map((it) => ({
                ...it,
                quantidade: Number(it.quantidade) || 0,
                unidade: it.unidade || "un",
                tags: Array.isArray(it.tags) ? it.tags.filter(Boolean) : ((it.label || "").trim() ? [(it.label || "").trim()] : []),
                registroData: it.registroData || (it.createdAt ? toLocalDateInputValue(new Date(it.createdAt)) : today),
                updatedAt: it.updatedAt || Date.now(),
                createdAt: it.createdAt || Date.now()
            }));
        }

        function buildExampleItems() {
            const now = Date.now();
            return [
                { id: uid(), nome: "Dipirona 500mg", categoria: "Remédios", quantidade: 8, unidade: "cp", tags: ["uso diário"], registroData: "2026-04-10", notas: "Analgésico", createdAt: now - 1000000, updatedAt: now - 1000000 },
                { id: uid(), nome: "Paracetamol 750mg", categoria: "Remédios", quantidade: 2, unidade: "cp", tags: ["reserva"], registroData: "2026-03-22", notas: "Ver lote", createdAt: now - 1000000, updatedAt: now - 1000000 },
                { id: uid(), nome: "Desodorante", categoria: "Cuidados Pessoais", quantidade: 1, unidade: "un", tags: ["banheiro"], registroData: "2026-04-28", notas: "Rexona", createdAt: now - 900000, updatedAt: now - 900000 },
                { id: uid(), nome: "Algodão", categoria: "Papelaria", quantidade: 1, unidade: "pct", tags: ["repor"], registroData: "2026-02-18", notas: "Bolinhas", createdAt: now - 800000, updatedAt: now - 800000 },
                { id: uid(), nome: "Caneta esferográfica", categoria: "Papelaria", quantidade: 3, unidade: "un", tags: ["escritório"], registroData: "2026-01-12", notas: "Azul", createdAt: now - 700000, updatedAt: now - 700000 },
                { id: uid(), nome: "Pilhas AA", categoria: "Diversos", quantidade: 10, unidade: "un", tags: ["eletrônicos"], registroData: "2025-12-06", notas: "Alcalina", createdAt: now - 600000, updatedAt: now - 600000 }
            ];
        }

        function AlmoxarifadoApp() {
            const [data, setData] = useState(() => {
                const initial = loadInitial();
                const hasStoredData = Array.isArray(initial.items) && initial.items.length > 0;
                const seededItems = hasStoredData ? initial.items : buildExampleItems();
                return { ...initial, items: normalizeItems(seededItems), purchaseLog: Array.isArray(initial.purchaseLog) ? initial.purchaseLog : [] };
            });
            const [lastSavedAt, setLastSavedAt] = useState(null);
            const [syncStatus, setSyncStatus] = useState(() => hasGistConfig() ? "☁ configurado" : "💾 local");
            const [showSync, setShowSync] = useState(false);
            const [cfgToken, setCfgToken] = useState(() => getToken());
            const [cfgGistId, setCfgGistId] = useState(() => getGistId());
            const [cfgMsg, setCfgMsg] = useState("");
            const [saveButtonState, setSaveButtonState] = useState("idle");

            function normalizeWarehouseState(raw) {
                return {
                    items: normalizeItems(raw?.items || []),
                    cats: Array.isArray(raw?.cats) && raw.cats.length ? raw.cats : CATEGORIAS_PADRAO,
                    purchaseLog: Array.isArray(raw?.purchaseLog) ? raw.purchaseLog : []
                };
            }
            function saveLocalData(snapshot = data) {
                try { localStorage.setItem(LS_STATE, JSON.stringify(snapshot)); } catch { }
                try { localStorage.setItem(LS_ITEMS, JSON.stringify(snapshot.items)); } catch { }
                try { localStorage.setItem(LS_CATS, JSON.stringify(snapshot.cats)); } catch { }
                try { localStorage.setItem(LS_PURCHASE_LOG, JSON.stringify(snapshot.purchaseLog || [])); } catch { }
                setLastSavedAt(Date.now());
            }
            async function saveCloudData(snapshot = data, token = getToken(), gistId = getGistId()) {
                await gistSaveWarehouse(JSON.stringify({
                    items: snapshot.items,
                    cats: snapshot.cats,
                    purchaseLog: snapshot.purchaseLog || []
                }), token, gistId);
            }
            function triggerManualSave(snapshot = data) {
                setSaveButtonState("saving");
                saveLocalData(snapshot);
                window.clearTimeout(window.__warehouseSaveButtonTimer);
                const finishSavedState = () => {
                    setSaveButtonState("saved");
                    window.__warehouseSaveButtonTimer = window.setTimeout(() => setSaveButtonState("idle"), 1400);
                };
                if (hasGistConfig()) {
                    setSyncStatus("☁ sincronizando…");
                    saveCloudData(snapshot)
                        .then(() => {
                            setSyncStatus("☁ sincronizado");
                            finishSavedState();
                        })
                        .catch((error) => {
                            console.error(error);
                            setSyncStatus("☁ erro");
                            setSaveButtonState("idle");
                            alert("Erro ao sincronizar o Warehouse com o Gist: " + error.message);
                        });
                    return;
                }
                finishSavedState();
            }
            async function testSyncConfig() {
                const token = cfgToken.trim();
                const gistId = cfgGistId.trim();
                if (!token || !gistId) {
                    setCfgMsg("Preencha token e gist id.");
                    return;
                }
                setCfgMsg("Testando…");
                try {
                    await gistFetchWarehouse(token, gistId);
                    setCfgMsg("✓ Conectado ao Gist.");
                } catch (error) {
                    setCfgMsg("Falhou: " + error.message);
                }
            }
            async function saveSyncConfig() {
                const token = cfgToken.trim();
                const gistId = cfgGistId.trim();
                if (!token || !gistId) {
                    setCfgMsg("Preencha token e gist id.");
                    return;
                }
                localStorage.setItem(TK, token);
                localStorage.setItem(GK, gistId);
                setCfgMsg("Sincronizando…");
                setSyncStatus("☁ sincronizando…");
                try {
                    const remote = await gistFetchWarehouse(token, gistId);
                    if (remote && remote.trim() && remote.trim() !== "{}") {
                        const parsed = normalizeWarehouseState(JSON.parse(remote));
                        if (confirm("Encontrei dados na nuvem. Substituir o que está aqui pelos da nuvem?\n\nOK = usar nuvem · Cancelar = enviar dados locais para a nuvem")) {
                            setData(parsed);
                            saveLocalData(parsed);
                            setCfgMsg("✓ Dados da nuvem carregados.");
                        } else {
                            saveLocalData(data);
                            await saveCloudData(data, token, gistId);
                            setCfgMsg("✓ Dados locais enviados.");
                        }
                    } else {
                        saveLocalData(data);
                        await saveCloudData(data, token, gistId);
                        setCfgMsg("✓ Primeiro envio para a nuvem.");
                    }
                    setSyncStatus("☁ sincronizado");
                } catch (error) {
                    setCfgMsg("Erro: " + error.message);
                    setSyncStatus("☁ erro");
                }
            }
            function clearSyncConfig() {
                if (!confirm("Desconectar a nuvem? Os dados continuam salvos localmente.")) return;
                localStorage.removeItem(TK);
                localStorage.removeItem(GK);
                setCfgToken("");
                setCfgGistId("");
                setCfgMsg("");
                setSyncStatus("💾 local");
            }

            // salvar sempre que mudar
            useEffect(() => {
                try { localStorage.setItem(LS_STATE, JSON.stringify(data)); } catch { }
                try { localStorage.setItem(LS_ITEMS, JSON.stringify(data.items)); } catch { }
                try { localStorage.setItem(LS_CATS, JSON.stringify(data.cats)); } catch { }
                try { localStorage.setItem(LS_PURCHASE_LOG, JSON.stringify(data.purchaseLog || [])); } catch { }
                setLastSavedAt(Date.now());
            }, [data]);

            useEffect(() => {
                const persistNow = () => saveLocalData(data);
                const onVisibilityChange = () => {
                    if (document.visibilityState === "hidden") persistNow();
                };
                window.addEventListener("beforeunload", persistNow);
                document.addEventListener("visibilitychange", onVisibilityChange);
                return () => {
                    window.removeEventListener("beforeunload", persistNow);
                    document.removeEventListener("visibilitychange", onVisibilityChange);
                };
            }, [data]);

            useEffect(() => {
                setSyncStatus(hasGistConfig() ? "☁ configurado" : "💾 local");
                try { if (typeof window !== 'undefined' && !window.__almox_tests) { runSelfTests(); window.__almox_tests = true; } } catch { }
            }, []);

            useEffect(() => {
                let cancelled = false;
                if (!hasGistConfig()) return;
                setSyncStatus("☁ baixando…");
                gistFetchWarehouse()
                    .then((remote) => {
                        if (cancelled) return;
                        if (remote && remote.trim() && remote.trim() !== "{}") {
                            const next = normalizeWarehouseState(JSON.parse(remote));
                            setData(next);
                            saveLocalData(next);
                            setSyncStatus("☁ sincronizado");
                        } else {
                            setSyncStatus("☁ vazio");
                        }
                    })
                    .catch((error) => {
                        if (cancelled) return;
                        console.error(error);
                        setSyncStatus("☁ erro");
                    });
                return () => { cancelled = true; };
            }, []);

            // CRUD itens
            const [showForm, setShowForm] = useState(false);
            const [editing, setEditing] = useState(null);
            const [showCats, setShowCats] = useState(false);

            function addItem() { setEditing(null); setShowForm(true); }
            function saveItem(it) { setData(d => { const exists = d.items.some(p => p.id === it.id); const items = exists ? d.items.map(p => p.id === it.id ? { ...it, updatedAt: Date.now() } : p) : [{ ...it, createdAt: Date.now(), updatedAt: Date.now() }, ...d.items]; return { ...d, items: normalizeItems(items) }; }); setShowForm(false); }
            function editItem(it) { setEditing(it); setShowForm(true); }
            function deleteItem(it) { setData(d => ({ ...d, items: d.items.filter(p => p.id !== it.id) })); }
            function inc(it) { setData(d => ({ ...d, items: d.items.map(p => p.id === it.id ? { ...p, quantidade: (p.quantidade || 0) + 1, updatedAt: Date.now() } : p) })); }
            function dec(it) { setData(d => ({ ...d, items: d.items.map(p => p.id === it.id ? { ...p, quantidade: Math.max(0, (p.quantidade || 0) - 1), updatedAt: Date.now() } : p) })); }
            function archiveItem(it) {
                const now = new Date();
                const entry = {
                    id: uid(),
                    itemId: it.id,
                    nome: it.nome,
                    categoria: it.categoria,
                    tags: Array.isArray(it.tags) ? it.tags : [],
                    unidade: it.unidade || "un",
                    quantidade: Number(it.quantidade) || 0,
                    action: "archived",
                    checkedAt: now.getTime()
                };
                setData(d => ({
                    ...d,
                    items: d.items.filter((p) => p.id !== it.id),
                    purchaseLog: [entry, ...(d.purchaseLog || [])]
                }));
            }
            function markChecked(it) {
                const raw = prompt(`Quantas unidades de "${it.nome}" você comprou?`, "1");
                if (raw === null) return;
                const quantidadeComprada = Number(raw);
                if (!Number.isFinite(quantidadeComprada) || quantidadeComprada <= 0) {
                    alert("Informe uma quantidade válida maior que zero.");
                    return;
                }
                const now = new Date();
                const registroData = toLocalDateInputValue(now);
                const entry = {
                    id: uid(),
                    itemId: it.id,
                    nome: it.nome,
                    categoria: it.categoria,
                    tags: Array.isArray(it.tags) ? it.tags : [],
                    unidade: it.unidade || "un",
                    quantidade: quantidadeComprada,
                    checkedAt: now.getTime()
                };
                setData(d => ({
                    ...d,
                    items: d.items.map((p) => p.id === it.id ? {
                        ...p,
                        quantidade: (Number(p.quantidade) || 0) + quantidadeComprada,
                        registroData,
                        updatedAt: Date.now()
                    } : p),
                    purchaseLog: [entry, ...(d.purchaseLog || [])]
                }));
            }
            function deleteHistoryEntry(entryId) {
                setData(d => ({ ...d, purchaseLog: (d.purchaseLog || []).filter((entry) => entry.id !== entryId) }));
            }

            function setCats(fnOrArr) { setData(d => ({ ...d, cats: typeof fnOrArr === 'function' ? fnOrArr(d.cats) : fnOrArr })); }

            // busca/ordenação/filtros
            const [query, setQuery] = useState("");
            const [categoria, setCategoria] = useState("Todas");
            const [sortBy, setSortBy] = useState("updated");

            const displayCats = useMemo(() => { const set = new Set([...(data.cats || [])]); for (const it of data.items) if (it.categoria) set.add(it.categoria); return Array.from(set); }, [data]);
            useEffect(() => { if (categoria !== "Todas" && !displayCats.includes(categoria)) setCategoria("Todas"); }, [displayCats]);

            const filtered = useMemo(() => {
                let out = [...data.items];
                if (categoria !== "Todas") out = out.filter(it => it.categoria === categoria);
                if (query.trim()) {
                    const q = normalizeText(query);
                    out = out.filter((it) => {
                        const haystack = [
                            it.nome,
                            it.notas,
                            it.categoria,
                            Array.isArray(it.tags) ? it.tags.join(" ") : ""
                        ].map(normalizeText).join(" ");
                        return haystack.includes(q);
                    });
                }
                switch (sortBy) { case "nome": out.sort((a, b) => a.nome.localeCompare(b.nome, "pt-BR")); break; case "categoria": out.sort((a, b) => a.categoria.localeCompare(b.categoria, "pt-BR") || a.nome.localeCompare(b.nome, "pt-BR")); break; case "quantidade": out.sort((a, b) => b.quantidade - a.quantidade); break; case "registro": out.sort((a, b) => (parseDate(b.registroData)?.getTime() || 0) - (parseDate(a.registroData)?.getTime() || 0)); break; default: out.sort((a, b) => b.updatedAt - a.updatedAt); }
                return out;
            }, [data.items, categoria, query, sortBy]);

            const purchaseLog = useMemo(() => [...(data.purchaseLog || [])].sort((a, b) => new Date(b.checkedAt).getTime() - new Date(a.checkedAt).getTime()), [data.purchaseLog]);
            const pendingItems = useMemo(() => data.items.filter(it => lowStock(it)), [data.items]);

            return (
                <div className="min-h-screen bg-slate-100">
                    {IS_FILE_PROTOCOL ? <WarningBanner>Esta página foi aberta como arquivo local (`file://`). Nesse modo, o navegador pode isolar ou sobrescrever o armazenamento e o save pode parecer quebrado. Use <b>http://localhost:8787/warehouse.html</b>.</WarningBanner> : null}
                    <Header onAdd={addItem} onSave={() => triggerManualSave(data)} onOpenSync={() => setShowSync(true)} saveLabel={lastSavedAt ? `Salvo ${formatDateTime(lastSavedAt)}` : "Ainda não salvo"} syncLabel={syncStatus} saveButtonLabel={saveButtonState === "saving" ? "Salvando…" : saveButtonState === "saved" ? "Salvo!" : "Salvar agora"} saveButtonDisabled={saveButtonState === "saving" || saveButtonState === "saved"} />

                    <main className="max-w-5xl mx-auto px-4 py-6 space-y-6">
                        <Section title="Resumo"><Stats items={data.items} /></Section>

                        <Section title={<span className="inline-flex items-center gap-2"><Icon.Search className="w-5 h-5" /> Controle de compras</span>} right={<div className="flex flex-col items-stretch gap-3 sm:flex-row sm:items-center"><div className="relative w-full sm:w-72"><Icon.Search className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none" /><input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Buscar por nome, tags ou notas..." className="w-full pl-10 pr-3 py-2 rounded-xl border border-slate-300 bg-white text-sm text-slate-900 placeholder-slate-400" /></div><span className="text-xs text-slate-500">{filtered.length} itens</span></div>}>
                            <div className="space-y-4">
                                <PendingList items={pendingItems} onCheck={markChecked} />
                                <Toolbar categoria={categoria} setCategoria={setCategoria} sortBy={sortBy} setSortBy={setSortBy} categorias={displayCats} onManageCats={() => setShowCats(true)} />
                                <Table items={filtered} onInc={inc} onDec={dec} onEdit={editItem} onArchive={archiveItem} onDelete={deleteItem} onCheck={markChecked} />
                            </div>
                        </Section>

                        <Section title={<span className="inline-flex items-center gap-2"><Icon.Cart className="w-5 h-5" /> Histórico de compras</span>}>
                            <PurchaseControl purchaseLog={purchaseLog} onDeleteEntry={deleteHistoryEntry} />
                        </Section>
                    </main>

                    {/* Modais */}
                    <Modal open={showForm} onClose={() => setShowForm(false)} title={editing ? "Editar item" : "Novo item"}>
                        <ItemForm initial={editing} onSubmit={saveItem} onCancel={() => setShowForm(false)} categorias={displayCats} onCreateCategoria={(nome) => setCats(prev => prev.includes(nome) ? prev : [...prev, nome])} />
                    </Modal>

                    <ManageCategoriesModal open={showCats} onClose={() => setShowCats(false)} categorias={data.cats} setCategorias={(cats) => setCats(cats)} items={data.items} setItems={(itemsOrUpdater) => setData(d => ({ ...d, items: normalizeItems(typeof itemsOrUpdater === 'function' ? itemsOrUpdater(d.items) : itemsOrUpdater) }))} />
                    <SyncModal open={showSync} onClose={() => setShowSync(false)} cfgToken={cfgToken} setCfgToken={setCfgToken} cfgGistId={cfgGistId} setCfgGistId={setCfgGistId} cfgMsg={cfgMsg} onTest={testSyncConfig} onSaveSync={saveSyncConfig} onClearSync={clearSyncConfig} />

                    <footer className="max-w-5xl mx-auto px-4 pb-10 pt-2 text-center text-xs text-slate-500">Feito com ♥ para organizar seu estoque. Registre a compra para atualizar a quantidade, guardar a data e manter o histórico abaixo.</footer>

                    <style>{`
            @media print { header, footer, .no-print { display: none !important; } main { padding: 0 !important; } body { background: white !important; } }
          `}</style>
                </div>
            );
        }

        // =============================
        // Auto-testes (console)
        // =============================
        function runSelfTests() {
            console.groupCollapsed("Almoxarifado – auto-testes");
            console.assert(parseDate("2025-10-01") instanceof Date, "parseDate deve retornar Date válido");
            console.assert(parseDate("") === null, "parseDate vazio deve retornar null");
            console.assert(formatDate("2025-10-01") === "01/10/2025", "formatDate deve converter para pt-BR");
            console.assert(stockStatus({ quantidade: 0 }).tone === "danger", "0 => sem estoque");
            console.assert(stockStatus({ quantidade: 1 }).tone === "warning", "1 => baixo");
            console.assert(stockStatus({ quantidade: 5 }).tone === "ok", "5 => ok");
            console.assert(lowStock({ quantidade: 0 }) === true, "0 => sem estoque");
            console.assert(lowStock({ quantidade: 1 }) === false, "1 => ainda disponível");
            console.assert(normalizeText("Escritório") === "escritorio", "normalizeText deve remover acentos");
            console.assert(toLocalDateInputValue(new Date(2026, 4, 3, 23, 42)) === "2026-05-03", "data local não deve escorregar para UTC");
            console.assert(Math.max(1, Number(0) || 1) === 1, "quantidade inicial mínima deve ser 1");
            const id1 = uid(), id2 = uid(); console.assert(id1 !== id2, "uid deve gerar valores diferentes");
            console.assert(classNames('a', null, undefined, 'b') === 'a b', "classNames deve ignorar falsy");
            console.groupEnd();
        }

        // monta app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AlmoxarifadoApp />);
    </script>
</body>

</html>
